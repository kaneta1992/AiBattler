<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIバトラー (大乱闘対応版)</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>

    <h1>🤖 AIバトラー</h1>

    <div id="mode-selection" class="section">
        <h2>遊び方を選んでください</h2>
        <button class="mode-btn" onclick="startHostMode()">👑 親機（ホスト）になる<br><span style="font-size: 0.6em; font-weight: normal;">この端末でマッチングとAI判定を行います</span></button>
        <button class="mode-btn" style="background-color: #3498db;" onclick="startPlayerMode()">🎮 子機（プレイヤー）として参加<br><span style="font-size: 0.6em; font-weight: normal;">ホストの部屋に入ってキャラを戦わせます</span></button>
    </div>

    <div id="host-view" class="hidden">
        <div class="section" style="border: 2px solid #f1c40f;">
            <h2>👑 ホストコントロールパネル</h2>
            <input type="password" id="api-key" placeholder="Gemini API Key を入力 (必須)">

            <div style="background: #fdfefe; padding: 15px; border: 2px dashed #ccc; border-radius: 8px; margin-bottom: 15px;">
                <p style="text-align: center; margin: 0; color: #7f8c8d;">参加者へ教えるルームPIN</p>
                <h3 id="display-pin" class="room-pin">----</h3>
            </div>

            <h3>👥 参加者ロビー (<span id="lobby-count">0</span>人)</h3>
            <div id="lobby-list" style="background: #fafafa; border: 1px solid #ccc; min-height: 100px; max-height: 200px; overflow-y: auto; margin-bottom: 10px;">
                <p style="padding: 10px; color: #999; margin:0;">プレイヤーの参加を待っています...</p>
            </div>

            <div class="control-panel">
                <h3 style="margin-top: 0; color: #16a085;">⚔️ バトル開始メニュー</h3>
                <p style="font-size: 0.8em; margin-bottom: 10px;">※リストのチェックボックスで戦わせる人を選んでください。</p>
                <div style="display: flex; gap: 10px;">
                    <button onclick="startSelectedBattle()" style="flex: 1;">指名対戦 (チェックした人で戦う)</button>
                    <button onclick="startBattleRoyale()" class="btn-danger" style="flex: 1;">大乱闘 (全員で戦う)</button>
                </div>
                <p id="host-status" style="color: #e67e22; font-weight: bold; text-align: center; margin: 5px 0 0 0;"></p>
            </div>
        </div>

        <div class="section">
            <h2>⚔️ 最新の戦闘ログ</h2>
            <div id="host-battle-log" style="white-space: pre-wrap; background: #333; color: #fff; padding: 15px; border-radius: 4px; font-family: monospace;">戦闘結果がここに表示されます。</div>
        </div>
    </div>

    <div id="player-view" class="hidden">
        <div class="section">
            <h2>1. キャラクター準備</h2>
            <input type="text" id="char-name" placeholder="名前 (例: 炎の魔術師フレア)">
            <textarea id="char-ability" placeholder="能力 (例: 相手の能力を無効化し、すべてを焼き尽くす炎を放つ)" rows="2"></textarea>
            <button onclick="createCharacter()">登録して保存</button>

            <h3>マイキャラクター (クリックで選択)</h3>
            <div id="character-list"></div>
            <p>現在選択中: <strong id="selected-char-name" style="color:#e74c3c;">未選択</strong></p>
        </div>

        <div class="section">
            <h2>2. ルームに参加</h2>
            <input type="number" id="room-pin-input" placeholder="ホストの4桁のPINを入力" style="font-size: 1.5em; text-align: center; letter-spacing: 5px;">
            <button id="join-btn" onclick="joinRoom()" disabled>ルームに入室する</button>
            <p id="player-status" style="font-weight: bold; color: #e67e22;"></p>
        </div>

        <div class="section">
            <h2>⚔️ 戦闘結果</h2>
            <div id="battle-log">ルームに参加すると、ホストが試合を開始します。</div>
        </div>
    </div>

    <script src="js/gemini.js"></script>
    <script src="js/app.js"></script>
    <script src="js/host.js"></script>
    <script src="js/player.js"></script>
</body>
</html>
